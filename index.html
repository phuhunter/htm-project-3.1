<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <link rel="stylesheet" href="./assets/css/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>Project 3.1</title>
    </head>
    <body>
        <!-- -------------- --HEADER-------------- -->
        <header class="header">
            <div class="content">
                <div class="header__inner">
                    <a href="#!" class="header__logo">
                        <img
                            src="./assets/img/logo.svg"
                            alt="modulars logo"
                            class="logo__img"
                        />
                    </a>
                    <nav class="header__nav">
                        <ul class="header__menu">
                            <li class="header__menu-item">
                                <a href="#!" class="header__menu-link">Home</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="#!" class="header__menu-link">About</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="#!" class="header__menu-link">Blog</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="#!" class="header__menu-link"
                                    >Contact</a
                                >
                            </li>
                        </ul>
                    </nav>
                    <div class="header__action">
                        <a href="" class="header__sign-up btn">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- -------------- --HERO-------------- -->
        <section class="hero">
            <div class="content">
                <div class="hero__inner">
                    <div class="hero__content">
                        <h1 class="hero__title">
                            We’re a creative design agency.
                        </h1>
                        <p class="hero__desc">
                            A brilliant, modular agency template for startup’s
                            build yours toady.
                        </p>
                        <div class="hero__actions">
                            <a href="#!" class="btn hero__btn">Get in touch</a>
                            <a href="#!" class="hero__watch">
                                <img
                                    src="./assets/img/ellipse.svg"
                                    alt=""
                                    class="hero__elip"
                                />
                                <img
                                    src="./assets/img/play.svg"
                                    alt=""
                                    class="hero__icon"
                                />
                            </a>
                            <a href=""
                                ><strong class="hero__text"
                                    >Watch Video</strong
                                ></a
                            >
                        </div>
                    </div>
                    <div class="hero__media">
                        <img
                            src="./assets/img/hero-test-1.png"
                            alt=""
                            class="hero__image hero__image--1"
                        />
                        <img
                            src="./assets/img/hero-test-2.png"
                            alt=""
                            class="hero__image hero__image--2"
                        />
                        <img
                            src="./assets/img/hero-test-3.png"
                            alt=""
                            class="hero__image hero__image--3"
                        />
                        <img
                            src="./assets/img/vector1.svg"
                            alt=""
                            class="hero__vector hero__vector--1"
                        />
                        <img
                            src="./assets/img/vector2.svg"
                            alt=""
                            class="hero__vector hero__vector--2"
                        />
                        <img
                            src="./assets/img/vector3.svg"
                            alt=""
                            class="hero__vector hero__vector--3"
                        />
                        <img
                            src="./assets/img/vector1.svg"
                            alt=""
                            class="hero__vector hero__vector--4"
                        />
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
